<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela 2</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }

        table{
            border-collapse: collapse;
            width: 300px;
        }

        td{
            border: 2px solid black;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <table>
        <tr>
            <td colspan="4">1</td>
            <td rowspan="4">4</td>
        </tr>
        <tr>
            <td rowspan="4">5</td>
            <td>5</td>
            <td>5</td>
            <td>8</td>
        </tr>
        <tr>

            <td>10</td>
            <td>11</td>
            <td>12</td>
        </tr>
        <tr>
            <td>14</td>
            <td>15</td>
            <td>16</td>
        </tr>
        <tr>
            <td colspan="4">20</td>
        </tr>
    </table>
</body>
</html>
