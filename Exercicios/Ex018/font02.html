<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes externas</title>
    <style>
        @font-face {
            font-family: 'love';
            src: url('fonts/love larry.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
            /*
            Tipos de format()
            -Opentype (0tf)
            -truetype (ttf)
            -embedded-opentype
            -truetype-aat (Apple Advance Typography)
            -svg
            */
        }
      body{
        font-family: Arial, Helvetica, sans-serif;
      } 
      h1{
        font-family: 'love', Times, serif;
        font-size: 3em;
        font-weight: normal;
      }
    </style>
</head>
<body>
    <h1>Olá, Mundo!</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Eum repellendus assumenda quae tempora illo, excepturi aliquid. Similique quae recusandae mollitia necessitatibus laborum amet deleniti, quisquam repellat itaque, perferendis blanditiis commodi.</p>
</body>
</html>
